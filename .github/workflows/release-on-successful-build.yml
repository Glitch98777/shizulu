name: Release successful builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shizulu-release-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ShizGuru source
        uses: actions/checkout@v4
        with:
          repository: Glitch98777/shizguru
          ref: main
          path: shizguru
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Add Android SDK tools to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1" "ndk;28.2.13676358"

      - name: Build ShizGuru debug APK
        working-directory: shizguru
        run: ./gradlew :manager:assembleDebug --no-daemon --console=plain

      - name: Compute build metadata
        id: meta
        working-directory: shizguru
        run: |
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          SHA="$(git rev-parse HEAD)"
          TAG="build-${BUILD_NUMBER}"
          TITLE="ShizGuru build ${BUILD_NUMBER}"
          APK_SRC="$(find manager/build/outputs/apk/debug -name 'ShizGuru-*.apk' | head -n 1)"
          APK_NAME="ShizGuru-${TAG}.apk"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "apk_src=shizguru/${APK_SRC}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="${{ steps.meta.outputs.title }}"
          APK="${{ steps.meta.outputs.apk_src }}"
          APK_NAME="${{ steps.meta.outputs.apk_name }}"
          NOTES=$(cat <<EOF
          Automated release from a successful build on main.

          ShizGuru commit: ${{ steps.meta.outputs.sha }}
          Build: ${{ steps.meta.outputs.build_number }}
          APK: ${APK_NAME}
          EOF
          )

          cp "$APK" "$APK_NAME"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_NAME" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --notes "$NOTES" --latest
          else
            gh release create "$TAG" "$APK_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          fi
