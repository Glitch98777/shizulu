name: Release successful builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shizulu-release-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Add Android SDK tools to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK 36
        run: yes | sdkmanager "platforms;android-36"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Compute build metadata
        id: meta
        run: |
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          TAG="build-${BUILD_NUMBER}"
          TITLE="Shizulu successful build ${BUILD_NUMBER}"
          APK_SRC="app/build/outputs/apk/debug/app-debug.apk"
          APK_NAME="Shizulu-${TAG}.apk"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "apk_src=${APK_SRC}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="${{ steps.meta.outputs.title }}"
          APK="${{ steps.meta.outputs.apk_src }}"
          APK_NAME="${{ steps.meta.outputs.apk_name }}"
          NOTES=$(cat <<EOF
          Automated release from a successful build on main.

          Commit: ${SHA}
          Build: ${{ steps.meta.outputs.build_number }}
          APK: ${APK_NAME}
          EOF
          )

          cp "$APK" "$APK_NAME"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_NAME" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --notes "$NOTES" --latest
          else
            gh release create "$TAG" "$APK_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          fi
