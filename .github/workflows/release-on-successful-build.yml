name: Release successful builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          TAG="build-${RUN_NUMBER}"
          TITLE="Shizulu successful build ${RUN_NUMBER}"
          APK="app/build/outputs/apk/debug/app-debug.apk"
          NOTES=$(cat <<EOF
          Automated release from a successful build on main.

          Commit: ${SHA}
          APK: Shizulu-${TAG}.apk
          EOF
          )

          cp "$APK" "Shizulu-${TAG}.apk"
          gh release create "$TAG" "Shizulu-${TAG}.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --latest
